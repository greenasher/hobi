<style>
*{box-sizing:border-box;margin:0;padding:0}

</style>

<div id="root"></div>
<script>
const CATEGORIES = [
  {id:'groceries',name:'Groceries',icon:'🛒',color:'#A8D8A8'},
  {id:'transport',name:'Transportation',icon:'🚗',color:'#A8C8E8'},
  {id:'fuel',name:'Fuel',icon:'⛽',color:'#F5D060'},
  {id:'dining',name:'Food & Dining',icon:'🍜',color:'#F5B08A'},
  {id:'shopping',name:'Shopping',icon:'🛍️',color:'#E8B4D8'},
  {id:'entertainment',name:'Entertainment',icon:'🎬',color:'#C8B4E8'},
  {id:'utilities',name:'Utilities',icon:'💡',color:'#A8E8E0'},
  {id:'rent',name:'Rent / Housing',icon:'🏠',color:'#F5A0A0'},
  {id:'healthcare',name:'Healthcare',icon:'💊',color:'#F5C4C4'},
  {id:'education',name:'Education',icon:'📚',color:'#B4D8F5'},
  {id:'pets',name:'Pets',icon:'🐾',color:'#D4C8A8'},
  {id:'travel',name:'Travel',icon:'✈️',color:'#A8C4F5'},
  {id:'subscriptions',name:'Subscriptions',icon:'📱',color:'#D0A8E8'},
  {id:'personal',name:'Personal Care',icon:'✨',color:'#F5C8E0'},
  {id:'savings',name:'Savings',icon:'💰',color:'#A8E8C8'},
  {id:'other',name:'Other',icon:'📦',color:'#D0C8C0'},
];

const INCOME_SOURCES = ['Salary','Freelancing','Gift','Investment','Side Hustle','Other'];

function defaultData() {
  return {user:null,transactions:[],budgets:{},goals:[],categories:[...CATEGORIES],notes:[],checklists:[],nextId:1,openingBalance:0,theme:'light',createdAt:new Date().toISOString()};
}

// appData is the in-memory cache the whole app reads/writes synchronously,
// exactly as before. Firestore is the persistence layer underneath it.
let appData = defaultData();

let _fb = null; // set once Firebase bridge script has loaded
let _currentUid = null; // Firestore doc id (the signed-in user's uid)
let _saveTimer = null;

// GUEST MODE: when true, the app runs entirely in-memory for this browser
// session. No Firestore reads or writes ever happen. Data is lost on
// refresh/close, by design.
let isGuestUser = false;

function waitForFirebase() {
  return new Promise(resolve => {
    if (window.__firebase) return resolve(window.__firebase);
    window.addEventListener('__firebase-ready', () => resolve(window.__firebase), {once:true});
  });
}

// Loads this user's document from Firestore. Creates it with default data
// if it doesn't exist yet (first-ever sign-in).
async function loadUserData(uid, profile) {
  const { db, doc, getDoc, setDoc } = _fb;
  const ref = doc(db, 'users', uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const data = snap.data();
    // Backfill fields that may not exist on older Firestore documents so
    // existing users stay fully compatible with new features.
    if (typeof data.openingBalance !== 'number') data.openingBalance = 0;
    if (!data.theme) data.theme = 'light';
    return Object.assign(defaultData(), data, {user: profile});
  } else {
    const fresh = Object.assign(defaultData(), {user: profile});
    await setDoc(ref, fresh);
    return fresh;
  }
}

// Drop-in replacement for the old localStorage saveData(appData) calls.
// Debounced slightly so rapid-fire changes (e.g. checklist toggles) collapse
// into a single Firestore write instead of one per keystroke/click.
function saveData(d) {
  if (isGuestUser) return; // guest mode: never read/write Firestore
  if (!_currentUid || !_fb) return; // not signed in yet, nothing to sync
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const { db, doc, setDoc } = _fb;
    setDoc(doc(db, 'users', _currentUid), d).catch(err => {
      console.error('Firestore save failed:', err);
    });
  }, 350);
}

// DELETE ACCOUNT: removes the Firestore document, then the Firebase Auth
// account itself, then signs out. Only ever called for signed-in (non-guest)
// users — guests have no account to delete.
async function deleteAccount() {
  if (isGuestUser || !_fb || !_currentUid) return;
  const { db, doc, deleteDoc, auth, signOut, deleteUser, reauthenticateWithPopup, googleProvider } = _fb;
  try {
    await deleteDoc(doc(db, 'users', _currentUid));
    await deleteUser(auth.currentUser);
  } catch (err) {
    // Firebase requires a recent sign-in to delete an account; if the
    // session is stale, silently re-authenticate via Google then retry once.
    if (err?.code === 'auth/requires-recent-login') {
      try {
        await reauthenticateWithPopup(auth.currentUser, googleProvider);
        await deleteDoc(doc(db, 'users', _currentUid));
        await deleteUser(auth.currentUser);
      } catch (err2) {
        console.error('Account deletion failed after re-auth:', err2);
        alert('Could not delete your account. Please try again.');
        return;
      }
    } else {
      console.error('Account deletion failed:', err);
      alert('Could not delete your account. Please try again.');
      return;
    }
  }
  _currentUid = null;
  appData = defaultData();
  state.signedIn = false;
  state.modal = null;
  state.accountMenuOpen = false;
  applyTheme('light');
  render();
}

function genId() { const id = (appData.nextId||1); appData.nextId = id+1; saveData(appData); return id; }

function fmt(n) {
  return '₹' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtShort(n) {
  if(Math.abs(n) >= 100000) return '₹' + (n/100000).toFixed(1) + 'L';
  if(Math.abs(n) >= 1000) return '₹' + (n/1000).toFixed(1) + 'k';
  return fmt(n);
}

// Opening balance is a starting point, never a transaction. It's always
// folded into the running balance but never appears in income totals,
// charts, or exports.
function getOpeningBalance() { return appData.openingBalance || 0; }
function getCurrentBalance() {
  const totalIncome = appData.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense = appData.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return getOpeningBalance() + totalIncome - totalExpense;
}

function thisMonth() { const now = new Date(); return {y:now.getFullYear(),m:now.getMonth()}; }
function isThisMonth(dateStr) {
  const d = new Date(dateStr); const t = thisMonth();
  return d.getFullYear()===t.y && d.getMonth()===t.m;
}
function monthLabel(y,m) { return new Date(y,m,1).toLocaleString('default',{month:'short',year:'2-digit'}); }

function getMonthlyTotals(type, months=6) {
  const now = new Date(); const results = [];
  for(let i=months-1;i>=0;i--) {
    let d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const y=d.getFullYear(), mo=d.getMonth();
    const txs = appData.transactions.filter(t=>{
      const td=new Date(t.date);
      return td.getFullYear()===y && td.getMonth()===mo && t.type===type;
    });
    results.push({label:monthLabel(y,mo), total:txs.reduce((s,t)=>s+t.amount,0)});
  }
  return results;
}

function getCatColor(catId) { const c=appData.categories.find(c=>c.id===catId); return c?c.color:'#E0E0E0'; }
function getCat(catId) { return appData.categories.find(c=>c.id===catId)||{name:'Other',icon:'📦'}; }

// THEME: applies immediately to the DOM, and persists per the rules:
// signed-in users -> Firestore (appData.theme, via saveData); guests -> localStorage.
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme==='dark'?'dark':'light');
}
function setTheme(theme) {
  theme = theme==='dark' ? 'dark' : 'light';
  appData.theme = theme;
  applyTheme(theme);
  if (isGuestUser) {
    try { localStorage.setItem('hobi_guest_theme', theme); } catch(e) {}
  } else {
    saveData(appData);
  }
}
function loadGuestTheme() {
  try { return localStorage.getItem('hobi_guest_theme') || 'light'; } catch(e) { return 'light'; }
}

  txFilter:'all', txSearch:'',

function setState(patch) { Object.assign(state,patch); render(); }

const root = document.getElementById('root');

function render() {

function attachAuthEvents() {
  document.getElementById('google-signin')?.addEventListener('click', async () => {
    const btn = document.getElementById('google-signin');
    if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }
    try {
      const { auth, googleProvider, signInWithPopup } = _fb;
      await signInWithPopup(auth, googleProvider);
      // onAuthStateChanged (set up in init()) takes it from here:
      // it loads the Firestore doc and flips state.signedIn.
    } catch (err) {
      console.error('Google sign-in failed:', err);
      alert('Sign-in failed. Please try again.');
      if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    }
  });
  document.getElementById('guest-signin')?.addEventListener('click', () => {
    startGuestSession();
  });
}

// GUEST MODE: spins up a fully in-memory session. Never touches Firebase.
function startGuestSession() {
  isGuestUser = true;
  _currentUid = null;
  appData = Object.assign(defaultData(), {
    user: {name:'Guest User', email:'', initials:'G', photoURL:''},
    theme: loadGuestTheme(),
  });
  applyTheme(appData.theme);
  state.signedIn = true;
  state.authLoading = false;
  state.needsOpeningBalance = true;
  render();
}

// created (signup), before the dashboard is ever seen. Never an income

// DASHBOARD
function renderDashboard() {
  const txs = appData.transactions;
  const monthIncome = txs.filter(t=>t.type==='income'&&isThisMonth(t.date)).reduce((s,t)=>s+t.amount,0);
  const monthExpense = txs.filter(t=>t.type==='expense'&&isThisMonth(t.date)).reduce((s,t)=>s+t.amount,0);
  const netSavings = monthIncome - monthExpense;
  const savingsRate = monthIncome>0 ? Math.round(netSavings/monthIncome*100) : 0;
  const currentBalance = getCurrentBalance();
  const catMap = {};
  txs.filter(t=>t.type==='expense'&&isThisMonth(t.date)).forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const topCat = Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];
  const recent = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const insights = [];
  if(txs.length===0) insights.push({icon:'🌸',text:'Welcome to hobi! Start by adding your first income or expense entry.'});
  else {
    if(topCat) insights.push({icon:'💡',text:`You spent most on <strong>${getCat(topCat[0]).name}</strong> this month (${fmt(topCat[1])}).`});
    if(savingsRate>20) insights.push({icon:'🌸',text:`Great job! You're saving <strong>${savingsRate}%</strong> of your income this month.`});
    else if(savingsRate<0) insights.push({icon:'⚠️',text:`Your expenses exceeded income by <strong>${fmt(Math.abs(netSavings))}</strong> this month.`});
    if(monthIncome>0) insights.push({icon:'✨',text:`You have <strong>${fmt(Math.max(0,monthIncome-monthExpense))}</strong> remaining from your income.`});
  }
  return `
    <div class="card accent-lilac" style="margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <div>
        <div class="stat-label">Current Balance</div>
        <div class="stat-value" style="font-size:1.8rem;color:${currentBalance>=0?'var(--text)':'var(--red-text)'}">${fmt(currentBalance)}</div>
      </div>
      <div style="font-size:.78rem;color:var(--text-soft);text-align:right">Includes opening balance of ${fmt(getOpeningBalance())}</div>
    </div>
    <div class="grid-4">
      <div class="stat-card accent-mint"><div class="stat-icon">💚</div><div class="stat-label">This Month Income</div><div class="stat-value">${fmt(monthIncome)}</div></div>
      <div class="stat-card accent-pink"><div class="stat-icon">🌹</div><div class="stat-label">This Month Expenses</div><div class="stat-value">${fmt(monthExpense)}</div></div>
      <div class="stat-card accent-lilac"><div class="stat-icon">💰</div><div class="stat-label">Net Savings</div><div class="stat-value" style="color:${netSavings>=0?'var(--green-text)':'var(--red-text)'}">${fmt(netSavings)}</div></div>
      <div class="stat-card accent-rose"><div class="stat-icon">📈</div><div class="stat-label">Savings Rate</div><div class="stat-value">${savingsRate}%</div></div>
    </div>
    <div class="grid-2" style="margin-bottom:1.25rem">
      <div class="card">
        <div class="section-header"><h3 class="section-title">Expense Breakdown</h3><span class="badge badge-pink">This month</span></div>
        <div class="chart-wrap-pie"><canvas id="pieChart" role="img" aria-label="Expense breakdown by category this month"></canvas></div>
        <div id="pie-legend" style="margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.4rem .75rem;font-size:.72rem;color:var(--text-soft)"></div>
      </div>
      <div class="card">
        <div class="section-header"><h3 class="section-title">Spending Trend</h3><span class="badge badge-pink">6 months</span></div>
        <div class="chart-wrap-line"><canvas id="trendChart" role="img" aria-label="Monthly income and expense trend over 6 months"></canvas></div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:1.25rem">
      <div class="card">
        <div class="section-header"><h3 class="section-title">Quick Insights</h3><span>🌸</span></div>
        ${insights.map(i=>`<div class="insight"><span class="insight-icon">${i.icon}</span><span>${i.text}</span></div>`).join('')}
      </div>
      <div class="card">
        <div class="section-header"><h3 class="section-title">Recent Transactions</h3><button class="btn btn-ghost btn-sm" data-view="transactions">View all</button></div>
        ${recent.length===0?'<div class="empty-state"><div class="empty-icon">🌸</div><p>No transactions yet.<br>Add your first entry!</p></div>':recent.map(t=>renderTxRow(t,false)).join('')}
      </div>
    </div>
    <div class="card">
      <div class="section-header"><h3 class="section-title">Savings Growth</h3><span class="badge badge-green">6 months</span></div>
      <div class="chart-wrap-bar"><canvas id="savingsChart" role="img" aria-label="Monthly net savings over 6 months"></canvas></div>
    </div>
  `;

// TRANSACTIONS
function renderTransactions() {
  let txs = [...appData.transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(state.txFilter!=='all') txs=txs.filter(t=>t.type===state.txFilter);
  if(state.txSearch) txs=txs.filter(t=>{
    const q=state.txSearch.toLowerCase();
    return t.notes?.toLowerCase().includes(q)||getCat(t.category).name.toLowerCase().includes(q)||(t.source||'').toLowerCase().includes(q);
  });
  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="search-bar">
        <input class="search-input" id="tx-search" placeholder="🔍  Search transactions..." value="${state.txSearch}">
        <button class="btn btn-primary" id="add-tx-btn">+ Add</button>
      </div>
      <div class="tabs">
        <button class="tab ${state.txFilter==='all'?'active':''}" data-filter="all">All</button>
        <button class="tab ${state.txFilter==='income'?'active':''}" data-filter="income">Income</button>
        <button class="tab ${state.txFilter==='expense'?'active':''}" data-filter="expense">Expenses</button>
      </div>
    </div>
    <div class="card">
      ${txs.length===0?'<div class="empty-state"><div class="empty-icon">🌸</div><p>No transactions yet.<br>Add your first one!</p></div>':txs.map(t=>renderTxRow(t,true)).join('')}
    </div>
  `;
}

function renderTxRow(t, showActions) {
  const cat=getCat(t.category);
  const d=new Date(t.date+'T00:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'});
  return `
    <div class="tx-row" data-id="${t.id}">
      <div class="tx-icon" style="background:${getCatColor(t.category)}25">${cat.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${t.notes||cat.name}</div>
        <div class="tx-meta">${cat.name} · ${d}${t.source?' · '+t.source:''}</div>
      </div>
      ${showActions?`<div class="tx-actions"><button class="btn btn-ghost btn-sm edit-tx-btn" data-id="${t.id}">✏️</button><button class="btn btn-danger btn-sm del-tx-btn" data-id="${t.id}">🗑️</button></div>`:''}
      <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
    </div>
  `;
}

// BUDGET
function renderBudget() {
  const monthExpenses = {};
  appData.transactions.filter(t=>t.type==='expense'&&isThisMonth(t.date)).forEach(t=>{monthExpenses[t.category]=(monthExpenses[t.category]||0)+t.amount;});
  const budgetCats = Object.keys(appData.budgets);
  return `
    <div class="grid-2">
      <div class="card">
        <h3 class="section-title" style="margin-bottom:1rem">This Month's Budget</h3>
        ${budgetCats.length===0?'<div class="empty-state"><div class="empty-icon">📋</div><p>No budgets set yet.<br>Set them on the right →</p></div>':
          budgetCats.map(catId=>{
            const budget=appData.budgets[catId];
            const spent=monthExpenses[catId]||0;
            const pct=Math.min(100,Math.round(spent/budget*100));
            const cat=getCat(catId);
            const cls=pct>=100?'danger':pct>=75?'warning':'';
            return `<div class="budget-item">
              <div class="budget-header">
                <span class="budget-name">${cat.icon} ${cat.name}</span>
                <span class="budget-amounts">${fmt(spent)} / ${fmt(budget)}</span>
              </div>
              <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
              ${pct>=90?`<div style="font-size:.72rem;color:${pct>=100?'var(--red-text)':'var(--amber-text)'};margin-top:.25rem">${pct>=100?'⚠️ Budget exceeded!':'⚡ '+pct+'% used'}</div>`:''}
            </div>`;
          }).join('')}

// CHARTS
let charts = {};
function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }

function renderCharts() {
  if(state.view!=='dashboard') return;
  setTimeout(()=>{ destroyCharts(); renderPieChart(); renderTrendChart(); renderSavingsChart(); }, 50);
}

function renderPieChart() {
  const canvas = document.getElementById('pieChart'); if(!canvas) return;
  const catMap = {};
  appData.transactions.filter(t=>t.type==='expense'&&isThisMonth(t.date)).forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const entries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(entries.length===0) return;
  const labels = entries.map(e=>getCat(e[0]).name);
  const data = entries.map(e=>e[1]);
  const colors = entries.map(e=>getCatColor(e[0]));
  const legend = document.getElementById('pie-legend');
  if(legend) legend.innerHTML = entries.map((e,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};display:inline-block"></span>${getCat(e[0]).name}: ${fmt(e[1])}</span>`).join('');
  const cardBg = appData.theme==='dark' ? '#1E1E1E' : '#FFF8F2';
  charts.pie = new Chart(canvas,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:cardBg}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}});
}

function renderTrendChart() {
  const canvas = document.getElementById('trendChart'); if(!canvas) return;
  const incomes = getMonthlyTotals('income',6);
  const expenses = getMonthlyTotals('expense',6);
  const tickColor = appData.theme==='dark' ? '#D0D0D0' : '#7A4E63';
  const gridColor = appData.theme==='dark' ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.04)';
  charts.trend = new Chart(canvas,{type:'line',data:{labels:incomes.map(d=>d.label),datasets:[
    {label:'Income',data:incomes.map(d=>d.total),borderColor:'#A8D8A8',backgroundColor:'rgba(168,216,168,.12)',tension:.4,pointRadius:3},
    {label:'Expenses',data:expenses.map(d=>d.total),borderColor:'#E9A5B5',backgroundColor:'rgba(233,165,181,.12)',tension:.4,pointRadius:3,borderDash:[4,3]}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tickColor}},y:{grid:{color:gridColor},ticks:{color:tickColor,callback:v=>fmtShort(v)}}}}});
}

function renderSavingsChart() {
  const canvas = document.getElementById('savingsChart'); if(!canvas) return;
  const incomes = getMonthlyTotals('income',6);
  const expenses = getMonthlyTotals('expense',6);
  const savings = incomes.map((d,i)=>({label:d.label,total:d.total-expenses[i].total}));
  const tickColor = appData.theme==='dark' ? '#D0D0D0' : '#7A4E63';
  const gridColor = appData.theme==='dark' ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.04)';
  charts.savings = new Chart(canvas,{type:'bar',data:{labels:savings.map(d=>d.label),datasets:[{label:'Net Savings',data:savings.map(d=>d.total),backgroundColor:savings.map(d=>d.total>=0?'rgba(168,216,168,.7)':'rgba(245,160,160,.7)'),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tickColor}},y:{grid:{color:gridColor},ticks:{color:tickColor,callback:v=>fmtShort(v)}}}}});
}

// EVENTS
function attachEvents() {
  document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.addEventListener('click',()=>setState({view:el.dataset.view,modal:null,expandedNote:null})));
  document.querySelectorAll('[data-view]:not(.nav-item)').forEach(el=>el.addEventListener('click',()=>setState({view:el.dataset.view,modal:null,expandedNote:null})));
  document.getElementById('signout-btn')?.addEventListener('click',async ()=>{
    if (isGuestUser) { exitGuestSession(); return; }
    try { await _fb.signOut(_fb.auth); } catch(err){ console.error('Sign out failed:', err); }
    // onAuthStateChanged handles resetting appData/state once Firebase confirms sign-out.
  });
  document.getElementById('ribbon-login-btn')?.addEventListener('click',()=>exitGuestSession());
  document.getElementById('ribbon-signup-btn')?.addEventListener('click',()=>exitGuestSession());
  document.getElementById('theme-toggle-input')?.addEventListener('change',e=>{
    setTheme(e.target.checked?'dark':'light');
    render();
  });
  document.getElementById('account-menu-btn')?.addEventListener('click',e=>{e.stopPropagation();setState({accountMenuOpen:!state.accountMenuOpen});});
  document.getElementById('open-account-modal-btn')?.addEventListener('click',()=>setState({accountMenuOpen:false,modal:{type:'account'}}));
  document.getElementById('chip-signout-btn')?.addEventListener('click',async ()=>{
    state.accountMenuOpen=false;
    if (isGuestUser) { exitGuestSession(); return; }
    try { await _fb.signOut(_fb.auth); } catch(err){ console.error('Sign out failed:', err); }
  });
  if(state.accountMenuOpen){
    document.addEventListener('click',function closeMenu(e){
      if(!e.target.closest('#account-menu-dropdown')&&!e.target.closest('#account-menu-btn')){
        setState({accountMenuOpen:false});
        document.removeEventListener('click',closeMenu);
      }
    });
  }
  document.getElementById('quick-add-btn')?.addEventListener('click',()=>setState({modal:{type:'add-tx',txType:'expense'}}));
  document.getElementById('modal-cancel')?.addEventListener('click',()=>setState({modal:null}));
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay')setState({modal:null});});
  document.querySelectorAll('[data-tx-type]').forEach(el=>el.addEventListener('click',()=>setState({modal:{...state.modal,txType:el.dataset.txType}})));

  // Tx save
  document.getElementById('modal-save')?.addEventListener('click',()=>{
    const amount=parseFloat(document.getElementById('tx-amount')?.value);
    const date=document.getElementById('tx-date')?.value;
    const catVal=document.getElementById('tx-cat')?.value;
    const notes=document.getElementById('tx-notes')?.value||'';
    const txType=state.modal?.txType||'expense';
    if(!amount||amount<=0||!date||!catVal){alert('Please fill in required fields.');return;}
    if(state.modal?.type==='edit-tx'){
      const tx=appData.transactions.find(t=>t.id===state.modal.tx.id);
      if(tx){tx.amount=amount;tx.date=date;tx.notes=notes;tx.type=txType;if(txType==='income'){tx.source=catVal;tx.category='other';}else{tx.category=catVal;tx.source='';}}
    } else {
      appData.transactions.push({id:genId(),type:txType,amount,date,notes,category:txType==='income'?'other':catVal,source:txType==='income'?catVal:''});
    }
    saveData(appData);setState({modal:null});
  });

  // Tx list
  document.getElementById('add-tx-btn')?.addEventListener('click',()=>setState({modal:{type:'add-tx',txType:'expense'}}));
  document.querySelectorAll('.tab[data-filter]').forEach(el=>el.addEventListener('click',()=>setState({txFilter:el.dataset.filter})));
  document.getElementById('tx-search')?.addEventListener('input',e=>setState({txSearch:e.target.value}));
  document.querySelectorAll('.edit-tx-btn').forEach(el=>el.addEventListener('click',()=>{const tx=appData.transactions.find(t=>t.id==el.dataset.id);if(tx)setState({modal:{type:'edit-tx',tx,txType:tx.type}});}));
  document.querySelectorAll('.del-tx-btn').forEach(el=>el.addEventListener('click',()=>{if(!confirm('Delete this transaction?'))return;appData.transactions=appData.transactions.filter(t=>t.id!=el.dataset.id);saveData(appData);render();}));

  // Budget
  document.getElementById('save-budgets-btn')?.addEventListener('click',()=>{
    document.querySelectorAll('.budget-input').forEach(inp=>{const v=parseFloat(inp.value);if(v>0)appData.budgets[inp.dataset.cat]=v;else delete appData.budgets[inp.dataset.cat];});
    saveData(appData);
    const btn=document.getElementById('save-budgets-btn');
    if(btn){btn.textContent='Saved! 🌸';setTimeout(()=>render(),800);}
  });

  // Goals
  document.getElementById('add-goal-btn')?.addEventListener('click',()=>setState({modal:{type:'add-goal'}}));
  document.querySelectorAll('.add-goal-amt-btn').forEach(el=>el.addEventListener('click',()=>setState({modal:{type:'add-goal-amt',goalId:parseInt(el.dataset.id)}})));
  document.querySelectorAll('.del-goal-btn').forEach(el=>el.addEventListener('click',()=>{if(!confirm('Delete this goal?'))return;appData.goals=appData.goals.filter(g=>g.id!=el.dataset.id);saveData(appData);render();}));
  document.getElementById('goal-save')?.addEventListener('click',()=>{
    const name=document.getElementById('goal-name')?.value;
    const target=parseFloat(document.getElementById('goal-target')?.value);
    const current=parseFloat(document.getElementById('goal-current')?.value)||0;
    const icon=document.getElementById('goal-icon')?.value||'🎯';
    const color=document.getElementById('goal-color')?.value||'#E9A5B5';
    if(!name||!target){alert('Please fill in name and target.');return;}
    appData.goals.push({id:genId(),name,target,current,icon,color});
    saveData(appData);setState({modal:null});
  });
  document.getElementById('goal-add-save')?.addEventListener('click',function(){
    const amt=parseFloat(document.getElementById('goal-add-amt')?.value)||0;
    const id=parseInt(this.dataset.id);
    const goal=appData.goals.find(g=>g.id===id);
    if(goal&&amt>0){goal.current=Math.min(goal.target,goal.current+amt);saveData(appData);}
    setState({modal:null});
  });

  // Notes
  document.getElementById('add-note-btn')?.addEventListener('click',()=>setState({modal:{type:'add-note'}}));
  document.getElementById('back-notes-btn')?.addEventListener('click',()=>setState({expandedNote:null}));
  document.querySelectorAll('.open-note-btn').forEach(el=>el.addEventListener('click',()=>setState({expandedNote:parseInt(el.dataset.id)})));
  document.querySelectorAll('.edit-note-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const note=appData.notes.find(n=>n.id==el.dataset.id);if(note)setState({modal:{type:'edit-note',note},expandedNote:null});}));
  document.querySelectorAll('.del-note-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();if(!confirm('Delete this note?'))return;appData.notes=appData.notes.filter(n=>n.id!=el.dataset.id);saveData(appData);setState({expandedNote:null});}));
  document.getElementById('note-save')?.addEventListener('click',function(){
    const title=document.getElementById('note-title')?.value||'Untitled';
    const body=document.getElementById('note-body')?.value||'';
    const editId=this.dataset.id;
    if(editId){const note=appData.notes.find(n=>n.id==editId);if(note){note.title=title;note.body=body;note.updatedAt=new Date().toISOString();}}
    else{appData.notes.push({id:genId(),title,body,createdAt:new Date().toISOString()});}
    saveData(appData);setState({modal:null});
  });

  // Checklists
  document.getElementById('add-checklist-btn')?.addEventListener('click',()=>setState({modal:{type:'add-checklist'}}));
  document.getElementById('cl-save')?.addEventListener('click',()=>{
    const title=document.getElementById('cl-title')?.value;
    const icon=document.getElementById('cl-icon')?.value||'✅';
    if(!title){alert('Please enter a title.');return;}
    appData.checklists.push({id:genId(),title,icon,items:[]});
    saveData(appData);setState({modal:null});
  });
  document.querySelectorAll('.del-cl-btn').forEach(el=>el.addEventListener('click',()=>{if(!confirm('Delete this checklist?'))return;appData.checklists=appData.checklists.filter(cl=>cl.id!=el.dataset.id);saveData(appData);render();}));
  document.querySelectorAll('.check-toggle').forEach(el=>el.addEventListener('change',()=>{
    const cl=appData.checklists.find(c=>c.id==el.dataset.cl);
    if(cl){cl.items[parseInt(el.dataset.idx)].checked=el.checked;saveData(appData);render();}
  }));
  document.querySelectorAll('.del-check-item-btn').forEach(el=>el.addEventListener('click',()=>{
    const cl=appData.checklists.find(c=>c.id==el.dataset.cl);
    if(cl){cl.items.splice(parseInt(el.dataset.idx),1);saveData(appData);render();}
  }));
  document.querySelectorAll('.add-check-item-btn').forEach(el=>el.addEventListener('click',()=>{
    const clId=el.dataset.cl;
    const input=document.querySelector(`.add-check-input[data-cl="${clId}"]`);
    const text=input?.value?.trim();
    if(!text)return;
    const cl=appData.checklists.find(c=>c.id==clId);
    if(cl){cl.items.push({text,checked:false});saveData(appData);render();}
  }));
  document.querySelectorAll('.add-check-input').forEach(inp=>inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){const btn=document.querySelector(`.add-check-item-btn[data-cl="${inp.dataset.cl}"]`);btn?.click();}
  }));

  // Categories
  document.getElementById('add-cat-btn')?.addEventListener('click',()=>setState({modal:{type:'add-cat'}}));
  document.getElementById('cat-save')?.addEventListener('click',()=>{
    const name=document.getElementById('cat-name')?.value;
    const icon=document.getElementById('cat-icon')?.value||'📦';
    const color=document.getElementById('cat-color')?.value||'#F8D7E6';
    if(!name){alert('Please enter a category name.');return;}
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now();
    appData.categories.push({id,name,icon,color});
    saveData(appData);setState({modal:null});
  });

  // Account modal
  document.getElementById('acct-edit-balance-btn')?.addEventListener('click',()=>setState({modal:{type:'edit-opening-balance'}}));
  document.getElementById('edit-opening-balance-save')?.addEventListener('click',()=>{
    const val=parseFloat(document.getElementById('edit-opening-balance-input')?.value);
    appData.openingBalance=isNaN(val)?0:val;
    saveData(appData);setState({modal:null});
  });
  document.getElementById('acct-edit-profile-btn')?.addEventListener('click',()=>{
    alert('Profile editing is coming soon! 🌸');
  });
  document.getElementById('acct-delete-btn')?.addEventListener('click',async ()=>{
    if (isGuestUser) {
      alert('Guest accounts cannot be deleted because no account exists.');
      return;
    }
    const confirmed = confirm('This action permanently deletes your account and all stored budgeting data. This cannot be undone.');
    if (!confirmed) return;
    await deleteAccount();
  });

  // Export
  document.querySelectorAll('.export-btn').forEach(el=>el.addEventListener('click',()=>{
    const f=el.dataset.format;
    const txs=appData.transactions;
    let content,filename,mime;
    if(f==='csv'){
      const rows=[['Date','Type','Category','Amount (₹)','Source','Notes'],...txs.map(t=>[t.date,t.type,getCat(t.category).name,t.amount,t.source||'',t.notes||''])];
      content=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');filename='hobi_transactions.csv';mime='text/csv';
    } else if(f==='json'){
      content=JSON.stringify(txs,null,2);filename='hobi_transactions.json';mime='application/json';
    } else {
      content=txs.map(t=>`${t.date} | ${t.type.toUpperCase()} | ${getCat(t.category).name} | ₹${t.amount} | ${t.notes||''}`).join('\n');
      filename='hobi_report.txt';mime='text/plain';
    }
    const blob=new Blob([content],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  }));
}

async function init() {
  _fb = await waitForFirebase();

  _fb.onAuthStateChanged(_fb.auth, async (firebaseUser) => {
    if (firebaseUser) {
      const profile = {
        name: firebaseUser.displayName || 'You',
        email: firebaseUser.email || '',
        initials: (firebaseUser.displayName || 'You').trim().charAt(0).toUpperCase() || 'Y',
        photoURL: firebaseUser.photoURL || '',
        createdAt: firebaseUser.metadata?.creationTime || null
      };
      try {
        isGuestUser = false;
        _currentUid = firebaseUser.uid;
        const { db, doc, getDoc } = _fb;
        const ref = doc(db, 'users', firebaseUser.uid);
        const snapBefore = await getDoc(ref);
        const isBrandNewUser = !snapBefore.exists();
        appData = await loadUserData(firebaseUser.uid, profile);
        state.signedIn = true;
        state.needsOpeningBalance = isBrandNewUser;
        applyTheme(appData.theme || 'light');
      } catch (err) {
        console.error('Failed to load Firestore data:', err);
        alert('Could not load your data. Please check your connection and refresh.');
        _currentUid = null;
        state.signedIn = false;
      }
    } else {
      _currentUid = null;
      if (!isGuestUser) {
        appData = defaultData();
        state.signedIn = false;
        applyTheme('light');
      }
    }
    state.authLoading = false;
    render();
  });
}

init();
</script>
